name: review-domain
description: >
  Knowledge-driven single-domain review. Default knowledge is frontend; override
  knowledge in workflow config for mobile or other stacks. Not a substitute for
  multi-reviewer review-frontend (use that for parallel arch/security/QA/coding).
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 10
initial_step: gather

steps:
  - name: gather
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: gather-review
    output_contracts:
      report:
        - name: review-target.md
          format: review-gather
    rules:
      - condition: Review target information gathered
        next: domain-review
      - condition: Unable to identify review target, insufficient information
        next: ABORT

  - name: domain-review
    edit: false
    persona: domain-reviewer
    policy: review
    knowledge: frontend
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: review-domain
    output_contracts:
      report:
        - name: domain-review.md
          format: domain-review
    rules:
      - condition: approved
        next: supervise
      - condition: needs_fix
        next: supervise

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
    rules:
      - condition: Review integration complete
        next: COMPLETE
