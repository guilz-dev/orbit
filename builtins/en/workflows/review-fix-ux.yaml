name: review-fix-ux
description: >
  UX design review with fix loop (ui-design.md and design artifacts only).
  Does not fix implementation code; use review-fix-frontend for code changes.
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 30
initial_step: gather
loop_monitors:
  - cycle:
      - ux-review
      - fix
    threshold: 3
    judge:
      persona: ux-reviewer
      instruction: loop-monitor-ux-review-fix
      rules:
        - condition: Healthy (progress being made)
          next: ux-review
        - condition: Unproductive (repeated findings, fixes not applied)
          next: supervise

steps:
  - name: gather
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: gather-review
    output_contracts:
      report:
        - name: review-target.md
          format: review-gather
    rules:
      - condition: Review target information gathered
        next: ux-review
      - condition: Unable to identify review target, insufficient information
        next: ABORT

  - name: ux-review
    edit: false
    persona: ux-reviewer
    policy: ux
    knowledge: ux
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: review-ux
    output_contracts:
      report:
        - name: ux-review.md
          format: ux-review
    rules:
      - condition: approved
        next: supervise
      - condition: needs_fix
        next: fix

  - name: fix
    edit: true
    persona: ux-designer
    policy: ux
    knowledge: ux
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: fix-ux-design
    rules:
      - condition: Design fixes complete
        next: ux-review
      - condition: Unable to proceed with design fixes
        next: supervise

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
    rules:
      - condition: Review integration complete
        next: COMPLETE
