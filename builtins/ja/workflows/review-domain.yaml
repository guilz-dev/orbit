name: review-domain
description: >
  Knowledge で決まる単一ドメインレビュー。既定 knowledge は frontend。
  mobile 等は workflow で knowledge を差し替える。5 並列の review-frontend の代替ではない。
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 10
initial_step: gather

steps:
  - name: gather
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: gather-review
    output_contracts:
      report:
        - name: review-target.md
          format: review-gather
    rules:
      - condition: レビュー対象の情報収集完了
        next: domain-review
      - condition: レビュー対象を特定できない、情報不足
        next: ABORT

  - name: domain-review
    edit: false
    persona: domain-reviewer
    policy: review
    knowledge: frontend
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: review-domain
    output_contracts:
      report:
        - name: domain-review.md
          format: domain-review
    rules:
      - condition: approved
        next: supervise
      - condition: needs_fix
        next: supervise

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
    rules:
      - condition: レビュー統合完了
        next: COMPLETE
