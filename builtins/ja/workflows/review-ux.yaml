name: review-ux
description: >
  UX 特化レビュー（状態網羅・ナビゲーション・アクセシビリティ・デザインシステム準拠）。
  コード品質・アーキテクチャは対象外。実装修正は review-fix-frontend を使う。
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_steps: 10
initial_step: gather

steps:
  - name: gather
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: gather-review
    output_contracts:
      report:
        - name: review-target.md
          format: review-gather
    rules:
      - condition: レビュー対象の情報収集完了
        next: ux-review
      - condition: レビュー対象を特定できない、情報不足
        next: ABORT

  - name: ux-review
    edit: false
    persona: ux-reviewer
    policy: ux
    knowledge: ux
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: review-ux
    output_contracts:
      report:
        - name: ux-review.md
          format: ux-review
    rules:
      - condition: approved
        next: supervise
      - condition: needs_fix
        next: supervise

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
    rules:
      - condition: レビュー統合完了
        next: COMPLETE
